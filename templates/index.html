<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="header">Deepfake Detection System</div>

<div class="container">
    <h2></h2>

    <div class="card">
        <form action="/predict_image" method="post" enctype="multipart/form-data">
            <h4>Upload Image</h4>

            <label class="file-label">
                Choose Image
                <input type="file" name="image" required onchange="showFileName(this, 'imgName')">
            </label>
            <span id="imgName" class="file-name"></span>

            <br>
            <button type="submit">Predict</button>
        </form>
    </div>

    <div class="card">
        <form action="/predict_video" method="post" enctype="multipart/form-data">
            <h4>Upload Video</h4>

            <label class="file-label">
                Choose Video
                <input type="file" name="video" required onchange="showFileName(this, 'vidName')">
            </label>
            <span id="vidName" class="file-name"></span>

            <br>
            <button type="submit">Predict</button>
        </form>
    </div>
</div>

<div class="footer">
    © 2026 Deepfake Detector • Built with Flask & Deep Learning
</div>

<script>
function showFileName(input, id) {
    document.getElementById(id).textContent = input.files[0].name;
}
</script>

</body>

</html>
